name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # --------------------------------------------------
  # 0. Run tests before releasing (reuse test workflow)
  # --------------------------------------------------
  tests:
    uses: ./.github/workflows/test.yml

  # --------------------------------------------------
  # 1. Create the release (ONCE)
  # --------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------
  # 2. Linux build
  # --------------------------------------------------
  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            pkg-config \
            gcc

      - name: Build & package
        run: |
          VERSION="${GITHUB_REF_NAME}"

          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -o github-notifier ./cmd/github-notifier

          tar -cJf github-notifier_${VERSION}_linux_amd64.tar.xz \
            github-notifier README.md LICENSE

          sha256sum github-notifier_${VERSION}_linux_amd64.tar.xz \
            > github-notifier_${VERSION}_linux_amd64.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            github-notifier_*_linux_amd64.tar.xz
            github-notifier_*_linux_amd64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------
  # 3. macOS build
  # --------------------------------------------------
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build & package
        run: |
          VERSION="${GITHUB_REF_NAME}"

          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -o github-notifier ./cmd/github-notifier

          tar -cJf github-notifier_${VERSION}_darwin_arm64.tar.xz \
            github-notifier README.md LICENSE

          shasum -a 256 github-notifier_${VERSION}_darwin_arm64.tar.xz \
            > github-notifier_${VERSION}_darwin_arm64.sha256

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            github-notifier_*_darwin_arm64.tar.xz
            github-notifier_*_darwin_arm64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------
  # 4. Windows build
  # --------------------------------------------------
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"

          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 \
            go build -o github-notifier.exe ./cmd/github-notifier

      - name: Package & checksum
        shell: pwsh
        run: |
          $Version = "${env:GITHUB_REF_NAME}"

          Compress-Archive `
            -Path github-notifier.exe, README.md, LICENSE `
            -DestinationPath github-notifier_${Version}_windows_amd64.zip

          certutil -hashfile github-notifier_${Version}_windows_amd64.zip SHA256 `
            | Select-Object -Skip 1 | Select-Object -First 1 `
            | Out-File github-notifier_${Version}_windows_amd64.sha256 -Encoding ascii

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            github-notifier_*_windows_amd64.zip
            github-notifier_*_windows_amd64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
